<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗兽棋</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .game-info {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(7, 50px);
            grid-template-rows: repeat(9, 50px);
            gap: 2px;
            background-color: #8B4513;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #90EE90;
            border: 1px solid #666;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        
        .cell.river {
            background-color: #4682B4;
        }
        
        .cell.trap {
            background-color: #FFB6C1;
        }
        
        .cell.den {
            background-color: #FFA07A;
        }
        
        .cell.selected {
            background-color: #FFD700;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        
        .cell.valid-move {
            background-color: #98FB98;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }
        
        .piece {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.7);
        }
        
        .piece.red {
            background-color: #FF6B6B;
            border: 2px solid #d63031;
        }
        
        .piece.blue {
            background-color: #74B9FF;
            border: 2px solid #0984e3;
        }
        
        .controls {
            margin-top: 20px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 10px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .captured-pieces {
            display: flex;
            margin-top: 10px;
            justify-content: center;
        }
        
        .captured-pieces div {
            margin: 0 10px;
            font-weight: bold;
        }
        
        .animal-name {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 10px;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <h1>斗兽棋</h1>
    
    <div class="game-info">当前玩家: <span id="current-player">红方</span></div>
    
    <div class="captured-pieces">
        <div>红方被吃: <span id="red-captured">0</span></div>
        <div>蓝方被吃: <span id="blue-captured">0</span></div>
    </div>
    
    <div class="board" id="game-board"></div>
    
    <div class="controls">
        <button id="restart-btn">重新开始</button>
        <button id="undo-btn">悔棋</button>
    </div>

    <script>
        class AnimalChess {
            constructor() {
                // 动物等级，数字越大等级越高
                this.animalRank = {
                    'mouse': 1,  // 鼠
                    'cat': 2,    // 猫
                    'dog': 3,    // 狗
                    'wolf': 4,   // 狼
                    'leopard': 5, // 豹
                    'tiger': 6,  // 虎
                    'lion': 7,   // 狮
                    'elephant': 8 // 象
                };
                
                // 棋盘尺寸
                this.rows = 9;
                this.cols = 7;
                
                // 初始化游戏板
                this.board = Array(this.rows).fill().map(() => Array(this.cols).fill(null));
                
                // 玩家
                this.players = ['red', 'blue'];
                this.currentPlayer = 'red';
                
                // 棋子数量统计
                this.redCaptured = 0;
                this.blueCaptured = 0;
                
                // 选中状态
                this.selectedPiece = null;
                this.validMoves = [];
                
                // 棋局历史
                this.history = [];
                
                this.initBoard();
                this.renderBoard();
                this.bindEvents();
            }
            
            // 初始化棋盘布局
            initBoard() {
                // 清空棋盘
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        this.board[r][c] = null;
                    }
                }
                
                // 红方棋子（上方）
                this.board[0][0] = { type: 'lion', player: 'red' };
                this.board[0][6] = { type: 'tiger', player: 'red' };
                this.board[2][1] = { type: 'cat', player: 'red' };
                this.board[2][5] = { type: 'dog', player: 'red' };
                this.board[1][2] = { type: 'elephant', player: 'red' };
                this.board[1][4] = { type: 'mouse', player: 'red' };
                this.board[2][3] = { type: 'leopard', player: 'red' };
                this.board[0][2] = { type: 'wolf', player: 'red' };
                
                // 蓝方棋子（下方）
                this.board[8][6] = { type: 'lion', player: 'blue' };
                this.board[8][0] = { type: 'tiger', player: 'blue' };
                this.board[6][5] = { type: 'cat', player: 'blue' };
                this.board[6][1] = { type: 'dog', player: 'blue' };
                this.board[7][4] = { type: 'elephant', player: 'blue' };
                this.board[7][2] = { type: 'mouse', player: 'blue' };
                this.board[6][3] = { type: 'leopard', player: 'blue' };
                this.board[8][4] = { type: 'wolf', player: 'blue' };
            }
            
            // 检查是否在河中
            isRiver(row, col) {
                if (col >= 1 && col <= 2 && row >= 3 && row <= 5) return true;
                if (col >= 4 && col <= 5 && row >= 3 && row <= 5) return true;
                return false;
            }
            
            // 检查是否在陷阱
            isTrap(row, col) {
                const redTraps = [[2, 2], [1, 3], [2, 4]];
                const blueTraps = [[6, 2], [7, 3], [6, 4]];
                
                if (this.currentPlayer === 'red') {
                    return blueTraps.some(([r, c]) => r === row && c === col);
                } else {
                    return redTraps.some(([r, c]) => r === row && c === col);
                }
            }
            
            // 检查是否在兽穴
            isDen(row, col) {
                return (row === 2 && col === 3) || (row === 6 && col === 3);
            }
            
            // 获取动物字符表示
            getAnimalChar(animal) {
                const chars = {
                    'lion': '🦁',
                    'tiger': '🐯',
                    'elephant': '🐘',
                    'leopard': '🐆',
                    'wolf': '🐺',
                    'dog': '🐕',
                    'cat': '🐈',
                    'mouse': '🐭'
                };
                return chars[animal] || '?';
            }
            
            // 获取动物中文名
            getAnimalName(animal) {
                const names = {
                    'lion': '狮',
                    'tiger': '虎',
                    'elephant': '象',
                    'leopard': '豹',
                    'wolf': '狼',
                    'dog': '狗',
                    'cat': '猫',
                    'mouse': '鼠'
                };
                return names[animal] || '?';
            }
            
            // 检查移动是否有效
            isValidMove(fromRow, fromCol, toRow, toCol) {
                const fromPiece = this.board[fromRow][fromCol];
                const toPiece = this.board[toRow][toCol];
                
                // 目标位置不能是己方兽穴
                if (this.currentPlayer === 'red' && toRow === 6 && toCol === 3) {
                    return false;
                }
                if (this.currentPlayer === 'blue' && toRow === 2 && toCol === 3) {
                    return false;
                }
                
                // 不能移动到己方陷阱
                if (this.isTrap(toRow, toCol)) {
                    if ((this.currentPlayer === 'red' && toRow >= 6) || 
                        (this.currentPlayer === 'blue' && toRow <= 2)) {
                        return false;
                    }
                }
                
                // 检查是否相邻
                const dr = Math.abs(fromRow - toRow);
                const dc = Math.abs(fromCol - toCol);
                
                if (!((dr === 1 && dc === 0) || (dr === 0 && dc === 1))) {
                    // 检查是否是跳跃（狮虎跳河）
                    if ((fromPiece.type === 'lion' || fromPiece.type === 'tiger') &&
                        this.isRiver(toRow, toCol) && 
                        fromRow === toRow && 
                        Math.abs(fromCol - toCol) === 3) {
                        // 检查中间是否有鼠阻挡
                        const step = fromCol < toCol ? 1 : -1;
                        for (let c = fromCol + step; c !== toCol; c += step) {
                            if (this.isRiver(fromRow, c) && this.board[fromRow][c] && 
                                this.board[fromRow][c].type === 'mouse') {
                                return false; // 有鼠阻挡
                            }
                        }
                        // 检查目标位置是否有敌方棋子且等级更高
                        if (toPiece && toPiece.player !== fromPiece.player) {
                            if (this.animalRank[toPiece.type] > this.animalRank[fromPiece.type]) {
                                return false;
                            }
                        }
                        return true;
                    }
                    return false;
                }
                
                // 检查是否在河中
                if (this.isRiver(toRow, toCol)) {
                    // 只有鼠才能在河中移动
                    if (fromPiece.type !== 'mouse') {
                        // 如果是狮或虎，检查是否跳跃
                        if ((fromPiece.type === 'lion' || fromPiece.type === 'tiger') &&
                            fromRow === toRow && Math.abs(fromCol - toCol) === 3) {
                            // 检查中间是否有鼠阻挡
                            const step = fromCol < toCol ? 1 : -1;
                            for (let c = fromCol + step; c !== toCol; c += step) {
                                if (this.isRiver(fromRow, c) && this.board[fromRow][c] && 
                                    this.board[fromRow][c].type === 'mouse') {
                                    return false; // 有鼠阻挡
                                }
                            }
                            // 检查目标位置是否有敌方棋子且等级更高
                            if (toPiece && toPiece.player !== fromPiece.player) {
                                if (this.animalRank[toPiece.type] > this.animalRank[fromPiece.type]) {
                                    return false;
                                }
                            }
                            return true;
                        }
                        return false;
                    }
                }
                
                // 如果目标位置有棋子
                if (toPiece) {
                    // 不能吃己方棋子
                    if (toPiece.player === fromPiece.player) {
                        return false;
                    }
                    
                    // 特殊规则：鼠可以吃象，象不能吃鼠
                    if (fromPiece.type === 'mouse' && toPiece.type === 'elephant') {
                        return true;
                    }
                    if (fromPiece.type === 'elephant' && toPiece.type === 'mouse') {
                        return false;
                    }
                    
                    // 一般规则：等级高的吃等级低的
                    return this.animalRank[fromPiece.type] >= this.animalRank[toPiece.type];
                }
                
                return true;
            }
            
            // 获取有效移动
            getValidMoves(row, col) {
                const moves = [];
                const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                
                for (const [dr, dc] of directions) {
                    const newRow = row + dr;
                    const newCol = col + dc;
                    
                    if (newRow >= 0 && newRow < this.rows && newCol >= 0 && newCol < this.cols) {
                        if (this.isValidMove(row, col, newRow, newCol)) {
                            moves.push([newRow, newCol]);
                        }
                    }
                }
                
                // 检查狮虎跳跃
                const piece = this.board[row][col];
                if (piece && (piece.type === 'lion' || piece.type === 'tiger')) {
                    // 检查水平跳跃
                    if (row >= 3 && row <= 5) { // 在河区域
                        // 向右跳跃
                        if (col === 1 && this.board[row][4] && this.isValidMove(row, col, row, 4)) {
                            moves.push([row, 4]);
                        }
                        // 向左跳跃
                        if (col === 5 && this.board[row][2] && this.isValidMove(row, col, row, 2)) {
                            moves.push([row, 2]);
                        }
                    }
                }
                
                return moves;
            }
            
            // 移动棋子
            movePiece(fromRow, fromCol, toRow, toCol) {
                const piece = this.board[fromRow][fromCol];
                const targetPiece = this.board[toRow][toCol];
                
                // 保存当前状态到历史
                this.history.push(JSON.parse(JSON.stringify({
                    board: this.board,
                    currentPlayer: this.currentPlayer,
                    redCaptured: this.redCaptured,
                    blueCaptured: this.blueCaptured
                })));
                
                // 如果目标位置有棋子，说明是吃子
                if (targetPiece) {
                    if (targetPiece.player === 'red') {
                        this.redCaptured++;
                    } else {
                        this.blueCaptured++;
                    }
                }
                
                // 移动棋子
                this.board[toRow][toCol] = piece;
                this.board[fromRow][fromCol] = null;
                
                // 检查是否获胜
                if (toRow === 2 && toCol === 3) { // 蓝方兽穴
                    if (piece.player === 'blue') {
                        alert('蓝方获胜！');
                        return;
                    }
                }
                if (toRow === 6 && toCol === 3) { // 红方兽穴
                    if (piece.player === 'red') {
                        alert('红方获胜！');
                        return;
                    }
                }
                
                // 切换玩家
                this.currentPlayer = this.currentPlayer === 'red' ? 'blue' : 'red';
                
                // 更新界面
                this.updateUI();
            }
            
            // 悔棋
            undoMove() {
                if (this.history.length > 0) {
                    const prevState = this.history.pop();
                    this.board = prevState.board;
                    this.currentPlayer = prevState.currentPlayer;
                    this.redCaptured = prevState.redCaptured;
                    this.blueCaptured = prevState.blueCaptured;
                    this.updateUI();
                }
            }
            
            // 更新界面
            updateUI() {
                document.getElementById('current-player').textContent = 
                    this.currentPlayer === 'red' ? '红方' : '蓝方';
                document.getElementById('red-captured').textContent = this.redCaptured;
                document.getElementById('blue-captured').textContent = this.blueCaptured;
                this.renderBoard();
            }
            
            // 渲染棋盘
            renderBoard() {
                const boardEl = document.getElementById('game-board');
                boardEl.innerHTML = '';
                
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        
                        // 添加河、陷阱、兽穴样式
                        if (this.isRiver(r, c)) {
                            cell.classList.add('river');
                        }
                        if (this.isTrap(r, c)) {
                            cell.classList.add('trap');
                        }
                        if (this.isDen(r, c)) {
                            cell.classList.add('den');
                        }
                        
                        // 高亮选中和有效移动
                        if (this.selectedPiece && 
                            this.selectedPiece.row === r && 
                            this.selectedPiece.col === c) {
                            cell.classList.add('selected');
                        }
                        
                        if (this.validMoves.some(([mr, mc]) => mr === r && mc === c)) {
                            cell.classList.add('valid-move');
                        }
                        
                        const piece = this.board[r][c];
                        if (piece) {
                            const pieceEl = document.createElement('div');
                            pieceEl.className = `piece ${piece.player}`;
                            pieceEl.innerHTML = `
                                <div>${this.getAnimalChar(piece.type)}</div>
                                <div class="animal-name">${this.getAnimalName(piece.type)}</div>
                            `;
                            cell.appendChild(pieceEl);
                        }
                        
                        boardEl.appendChild(cell);
                    }
                }
            }
            
            // 绑定事件
            bindEvents() {
                document.getElementById('game-board').addEventListener('click', (e) => {
                    const cell = e.target.closest('.cell');
                    if (!cell) return;
                    
                    const row = parseInt(cell.dataset.row);
                    const col = parseInt(cell.dataset.col);
                    const piece = this.board[row][col];
                    
                    // 如果已经选中了一个棋子
                    if (this.selectedPiece) {
                        // 如果点击的是有效移动位置
                        if (this.validMoves.some(([r, c]) => r === row && c === col)) {
                            this.movePiece(this.selectedPiece.row, this.selectedPiece.col, row, col);
                            this.selectedPiece = null;
                            this.validMoves = [];
                        } 
                        // 如果点击的是另一个己方棋子
                        else if (piece && piece.player === this.currentPlayer) {
                            this.selectedPiece = { row, col };
                            this.validMoves = this.getValidMoves(row, col);
                        } 
                        // 点击其他位置，取消选中
                        else {
                            this.selectedPiece = null;
                            this.validMoves = [];
                        }
                    } 
                    // 如果没有选中棋子，选中当前点击的己方棋子
                    else if (piece && piece.player === this.currentPlayer) {
                        this.selectedPiece = { row, col };
                        this.validMoves = this.getValidMoves(row, col);
                    }
                    
                    this.renderBoard();
                });
                
                document.getElementById('restart-btn').addEventListener('click', () => {
                    this.initBoard();
                    this.currentPlayer = 'red';
                    this.redCaptured = 0;
                    this.blueCaptured = 0;
                    this.selectedPiece = null;
                    this.validMoves = [];
                    this.history = [];
                    this.updateUI();
                });
                
                document.getElementById('undo-btn').addEventListener('click', () => {
                    this.undoMove();
                });
            }
        }
        
        // 启动游戏
        window.addEventListener('DOMContentLoaded', () => {
            new AnimalChess();
        });
    </script>
</body>
</html>
